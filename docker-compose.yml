version: "3.8"

services:
  backend:
    build: .
    ports:
      - "3000"
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:15
    restart: always
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf

volumes:
    pgdata: